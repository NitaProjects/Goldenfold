<div class="dashboard-container">
  <header class="header">
    <div class="header-content">
      <h1>Administrador de Sistema</h1>
      <div class="user-info">
        <span>Admin. Laura García</span>
        <button class="logout-btn" (click)="logout()">Cerrar Sesión</button>
      </div>
    </div>
  </header>

  <nav class="navbar">
    <input type="text" class="search-bar" placeholder="Buscar usuario...">
    <select class="filter" id="filter-rol" (change)="filterUsuarios()">
      <option value="">Rol</option>
      <option value="admin">Administrador</option>
      <option value="doctor">Doctor</option>
      <option value="nurse">Enfermera</option>
      <option value="staff">Personal</option>
    </select>
  </nav>

  <div class="content">
    <div class="usuarios-section">
      <h2>Usuarios Registrados</h2>
      <table>
        <thead>
          <tr>
            <th>ID Usuario</th>
            <th>Nombre</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="usuarios-table-body">
          <tr>
            <td>1</td>
            <td>Laura García</td>
            <td>laura.garcia</td>
            <td>Administrador</td>
            <td><button class="edit-btn" (click)="editUser(1)">Editar</button></td>
          </tr>
          <tr>
            <td>2</td>
            <td>Juan Pérez</td>
            <td>juan.perez</td>
            <td>Doctor</td>
            <td><button class="edit-btn" (click)="editUser(2)">Editar</button></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="statistics-section">
      <h2>Estadísticas</h2>
      <div class="charts">
        <div class="chart-container">
          <canvas id="userRolesChart"></canvas>
        </div>
        <div class="chart-container">
          <canvas id="userRegistrationChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
