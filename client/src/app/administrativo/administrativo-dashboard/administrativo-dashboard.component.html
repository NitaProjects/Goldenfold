<div class="dashboard-container">
  <div class="dashboard-container">
    <header class="header">
      <div class="header-content">
        <h1>Dashboard del Administrativo</h1>
        <div class="user-info">
          <span>Admin. Laura García</span>
          <button class="logout-btn" (click)="logout()">Cerrar Sesión</button>
        </div>
      </div>
    </header>
  
    <div class="content">
      <div class="link-section">
        <a routerLink="/administrativo/pacientes" class="dashboard-link">Ver Pacientes</a>
        <a routerLink="/administrativo/altas" class="dashboard-link">Ver Altas</a>
      </div>
    </div>
  </div>
  
  
    <div class="content">
      <div class="register-section">
        <h2>Registrar Nuevo Paciente</h2>
        <form (submit)="registerPatient()">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Nombre del paciente">
          </div>
          <div class="form-group">
            <label for="edad">Edad</label>
            <input type="number" id="edad" name="edad" required placeholder="Edad del paciente">
          </div>
          <div class="form-group">
            <label for="sintomas">Síntomas</label>
            <textarea id="sintomas" name="sintomas" required placeholder="Síntomas del paciente"></textarea>
          </div>
          <div class="form-group">
            <label for="seguridad-social">Número de Seguridad Social</label>
            <input type="text" id="seguridad-social" name="seguridad-social" required placeholder="Número de Seguridad Social">
          </div>
          <div class="form-group">
            <label for="contacto">Información de Contacto</label>
            <input type="text" id="contacto" name="contacto" required placeholder="Información de contacto">
          </div>
          <button type="submit" class="submit-btn">Registrar Paciente</button>
        </form>
      </div>
  
      <div class="patients-section">
        <h2>Pacientes Registrados</h2>
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Edad</th>
              <th>Síntomas</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let patient of patients">
              <td>Juan Garcia</td>
              <td>45</td>
              <td>Fiebre, Tos</td>
              <td>Estable</td>
            </tr>
            <tr *ngFor="let patient of patients">
              <td>Maria Rodriguez</td>
              <td>30</td>
              <td>Dolor de Cabeza</td>
              <td>Estable</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
