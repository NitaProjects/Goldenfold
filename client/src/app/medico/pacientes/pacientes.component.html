<div class="patients-list">
    <h2>Lista de Pacientes</h2>
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Edad</th>
          <th>Síntomas</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let patient of patients">
          <td>{{ patient.name }}</td>
          <td>{{ patient.age }}</td>
          <td>{{ patient.symptoms }}</td>
          <td>{{ patient.status }}</td>
          <td>
            <button (click)="viewPatient(patient)">Ver</button>
            <button (click)="editPatient(patient)">Editar</button>
            <button (click)="requestBed(patient)">Solicitar Cama</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
